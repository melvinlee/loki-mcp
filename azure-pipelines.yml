trigger:
  branches:
    include:
      - main
  tags:
    include:
      - v*

pr: none

variables:
  DOCKERHUB_REPO: $(DOCKERHUB_USERNAME)/loki-mcp

stages:
  - stage: build_and_push
    displayName: Build and Push
    jobs:
      - job: docker
        displayName: Docker Build & Push
        pool:
          vmImage: ubuntu-latest
        steps:
          - bash: |
              if [[ "$(Build.SourceBranch)" == refs/tags/* ]]; then
                TAG="${BUILD_SOURCEBRANCH#refs/tags/v}"
                echo "##vso[task.setvariable variable=imageTag]$TAG"
                echo "##vso[task.setvariable variable=isRelease]true"
              else
                SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-7)
                echo "##vso[task.setvariable variable=imageTag]sha-$SHORT_SHA"
                echo "##vso[task.setvariable variable=isRelease]false"
              fi
            displayName: Compute image tag
            env:
              BUILD_SOURCEBRANCH: $(Build.SourceBranch)

          - task: Docker@2
            displayName: Build and push $(imageTag)
            inputs:
              command: buildAndPush
              containerRegistry: dockerhub
              repository: $(DOCKERHUB_REPO)
              dockerfile: Dockerfile
              buildContext: .
              tags: $(imageTag)

          - task: Docker@2
            displayName: Push latest tag
            condition: eq(variables['isRelease'], 'true')
            inputs:
              command: buildAndPush
              containerRegistry: dockerhub
              repository: $(DOCKERHUB_REPO)
              dockerfile: Dockerfile
              buildContext: .
              tags: latest
